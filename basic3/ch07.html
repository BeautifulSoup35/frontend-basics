<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            height: 100vh;
            margin: 0;
            
        }
        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;

            width: 1200px;
            height: 100%;
            overflow: hidden;
        }

        .big-box {
            display: flex;
            box-sizing: border-box;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px 40px;
            margin-top: 50px;
            width: 500px;
            height: 10%;
            border: 1px solid #dbdddb;

        }
        .box {
            position: relative; /*자식의 기준점이 되겠다*/
            margin-bottom: 15px;

            flex-direction: column;
            width: 100%;
            height: 50px;

            & > label {
                position: absolute;
                top: 50%;
                transform: translateY(-50%);
            }
            & > input {
                box-sizing: border-box;
                height: 50px;
                width: 100%;
            }
        }
        
        .btn {
            box-sizing: border-box;
            justify-content: center;
            align-items: center;
            margin-top: 15px;
            background-color: rgb(0, 94, 202);
            color: #dbdddb;
            width: 100%;
            height: 50px;
        }
        .not-input {
            & > label {
                position: absolute;
                top: 25%;
                transform: translateY(-50%);
            }
            & > input {
                box-sizing: border-box;
                height: 25px;
                width: 100%;
            }
        }
            
            </style>
            </head>
            <body>
                <!-- 1. input 2개 (username, password) -->
     <!-- 2. button 1ro (등록하시) -->
</body>
    <div class="container">

        <div class="big-box">
            <div class="box">
                <label for="username">사용자 이름</label>
                <input type="text" id="username" name="username">
            </div>
            <div class="box">
                <label for="password">비밀번호</label>
                <input type="password" id="password" name="password">
                
            </div>
            <div class="box">
                <button class="btn">등록하기</button>
            </div>
        </div>
    </div>
    
    <script>
        let 
    </script>
</html>
