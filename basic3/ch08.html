<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <style>
            html, body {
                 margin: 0;
                 height: 100vh;
            }
            .container {
                 display: flex; 
                 justify-content: center;
                 align-items: flex-start;
                 gap: 20px;
                 margin: 100px auto;
                 padding: 100px 0;
                 /* bording -> padding */
                 width: 1200px;
                 overflow: auto;
            }

            .card {
                 display: flex;
                flex-direction: column;
                 justify-content: center;
                 align-items: center;
                 margin-bottom: 20px;
                 box-sizing: border-box;
                 width: 500px;
                 border: 1px solid #dbdbdb;
                 box-shadow: 0 0 5px #00000044;
                 padding: 20px;
                
            }
            .card2 {
                display: flex;
                flex-direction: column;
            }
            .input-box {
                position: relative;
                flex-direction: column;
                margin-bottom: 15px;
                box-sizing: border-box;
                border: 1px solid #dbdbdb;
                border-radius: 4px;
                padding: 5px 10px;
                width: 360px;
                height: 50px;
                overflow: hidden;

                & > label {/* 부모의 요소들 */
                    transition: all 0.3s ease-in-out;
                    position: absolute;
                    transform: translateY(-50%);
                    top: 50%;
                    left: 10px;
                    background-color: transparent;
                    font-size: 14px;
                    color: #444;
                }
                & > input {
                    transition: all 0.3s ease-in-out;
                    position: relative;
                    z-index: 10;
                    outline: none;
                    border: none;
                    width: 100%;
                    height: 100%;
                    background-color: #00000000;
                    color: #444;

                }

            }

            .input-is-not-empty {
                & > label {
                    font-size: 12px;
                    top: 25%;
                }
                & > input {
                    top: 30%;
                    height: 80%;

                }
            }
            .register-button {
                display: flex;
                box-sizing: border-box;

                justify-content: center;
                align-items: center;

                border: 1px solid #dbdbdb;
                border-radius: 4px;
                width: 100%;
                height: 40px;
                background-color: #1959b9;
                color: #fafafa;
                cursor: pointer;
                
                &:hover {
                    background-color: #164b99;
                }
                &:active {
                    background-color: #0d2b57;

                }
            }

            .option-items-top {
                display: flex;
                justify-content: space-between;
                gap: 30px;
                width: 100%;
            }
            .search-box {
                box-sizing: border-box;
                padding: 0 10px;
                width: 300px;
            }
            .df-row {
                display: flex;
                
            }
            .btn {
                display: flex;
                box-sizing: border-box;
                justify-content: center;
                align-items: center;

                border: 1px solid #dbdbdb;
                border-radius: 4px;
                padding: 8px 10px;
                background-color: #555555;
                color: #fafafa;
                cursor: pointer;
                
                &:hover {
                    background-color: #383838;
                }
                &:active {
                    background-color: #2e2e2e;

                }
            }

            .btn.edit {
                background-color: #da8619;
                &:hover {
                    background-color: #f08811;
                }
                &:active {
                    background-color: #ff6224;

                }
            
            }
                .btn.delete {
                    background-color: #cb0000;
                    &:hover {
                    background-color: #af0000;
                }
                &:active {
                    background-color: #8f0000;

                }

            }
            .user-table {
                box-sizing:  border-box;
                /* collapse : .표 만들때 테두리 하나로 합침 */
                border-collapse: collapse;
                border: 1px solid #dbdbdb;
                border-radius: 4px;

                width: 500px;
                overflow: hidden;

                &th, &td {
                    box-sizing: border-box;
                    border: 1px solid #dbdbdb;
                    padding: 5xp 10px;
                }
            }
            
        </style>
    </head>
    <body>
        <div class="container">
            
            <div class="card">
                <div class="input-box">
                    <input type="text" id="un" name="username">
                    <label for="un">사용자 이름</label>
                </div>
                <div class="input-box">
                    <input type="password" id="pw" name="password">
                    <label for="pw">사용자 비밀번호</label>
                </div>
                <button class="register-button">사용자 정보 등록</button>
            </div>

            <div class="card2">
                <div class=" card">
                    <div class="option-items-top">
                        <div class="df-row">
                            <input type="text" class="search-box">
                            <button class="btn">검색</button>
                        </div>
                        <div class="df-row">
                            <button class="btn edit">수정</button>
                            <button class="btn delete">삭제</button>
                        </div>
                    </div>
    
                    </div>
                
    
                    <div class="card">
                         <table class="user-table">
                            <thead>
                                <tr>
                                    <th><input type="checkbox"></th>
                                    <th>ID</th>
                                    <th>사용자 이름</th>
                                    <th>비밀번호</th>
                                    <th>삭제</th>
                                </tr>
                            </thead>
                            <tbody class="body-table">
                                <td></td>
                                <td></td>
                                <td></td>
                            </tbody>
                         </table>
                    </div>
    
                </div>

            </div>
        </div>
        
        <script>
           
            let userList = [];

            function autoIncrement() {
                let currentId = 0;
                return function () {
                    currentId++;
                    return currentId;
                }
            }

            const getNewId = autoIncrement(); //id 증가



            const inputBoxs = document.querySelectorAll(".input-box"); //input박스의 요소들을 다 들고
            // console.log(inputBoxs);
                /*0
                    : 
                    div.input-box.input-is-not-empty
                    1
                    : 
                    div.input-box
                */
               for(let inputBox of inputBoxs) {
                const inputElement = inputBox.querySelector("input");
                inputElement.onfocus = (event) => {//포커스가 갔을때
                    inputBox.classList.add("input-is-not-empty");
                }
                inputElement.onblur = (event) => {//포커스가 갔을때
                    //target == input
                    if(!event.target.value) {//value값이 null일때만 제거하라
                        inputBox.classList.remove("input-is-not-empty");
                    }
                }
                
               }
               
            const registerButton = document.querySelector(".register-button");//버튼

            registerButton.addEventListener("click", () => {
                const inputs = Array.from(inputBoxs).map(inputBox => inputBox.querySelector("input"));
                let newUser = {
                    id: getNewId(),
                }
                Array.from(inputs).forEach(element => {
                    newUser = {
                        ...newUser,
                        [element.name] : element.value,

                    }
                    
                    // let tableB = [];
                    // tableB.push(`<td>${newUserp.id}</td><td>${newUser.name}</td><td>${newUser.value}</td>`);
                    
                    
                        
                }
            )});

            registerButton.onclick  = () => {
                const inputs = Array.from(inputBoxs).map(inputBox => inputBox.querySelector("input"));
                let newUser = {
                    id: getNewId(),
                }
                
                Array.from(inputs).forEach(element => {
                    newUser = {
                        ...newUser,
                        [element.name] : element.value,//여기서 name과 value는 뭐야

                    }
                });
                userList = [
                    ...userList,
                    newUser
                ];
                tableRender();
                console.log(userList);
            }

            function handleDeleteonClick(id) {
                    userList = userList.filter(user => user.id !== id);
                    tableRender();
            }
            
            function tableRender() {
                const bodyTable = document.querySelector(".user-table > tbody");
                // for(let user of userList) {
                //     bodyTable.innerHTML = (`
                //     <tr>
                //         <td>${user.id}</td>
                //         <td>${user.username}</td>
                //         <td>${user.password}</td>
                //         <td><button onclick = "handleDeleteonClick(${user.id})">삭제</button></td>
                //     </tr>
                    
                //     `);
                // }

                userList.map(user => bodyTable.innerHTML = (`
                        <tr>
                        <td>${user.id}</td>
                        <td>${user.username}</td>
                        <td>${user.password}</td>
                        <td><button onclick = "handleDeleteonClick(${user.id})">삭제</button></td>
                    </tr>`)
                ).join("");
            }

        </script>    
    </body>
</html>
