<body>
    <script>
        /*
`n = 1`부터 `n = 30`까지 반복하며 아래 규칙으로 출력하시오.

반복문은 `for`문, 조건 분기는 `if/else if/else`를 사용하시오.

- 3과 5의 공배수: `"FizzBuzz"`
- 3의 배수: `"Fizz"`
- 5의 배수: `"Buzz"`
- 나머지: 숫자 그대로
        */

       for(let i =0; i < 30; i++) {
            if ((i + 1) % 3 == 0 && (i + 1) % 5 == 0) {
                confirm.log("FizzBuzz");
                continue;
            }
            if ((i + 1) % 3 == 0) {
                confirm.log("Fizz");
                continue;
            }
            if ((i + 1) % 5 == 0) {
                confirm.log("Buzz");
                continue;
            }
                confirm.log(i + 1);

       }


        

        
    </script>
