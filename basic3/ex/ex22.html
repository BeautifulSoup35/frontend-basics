<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
    </head>
    <body>
        <script>
            /*
            숫자 배열과 콜백 함수를 받아, 배열의 각 요소에 콜백을 적용한 새 배열을 반환하는

            `myMap` 함수를 작성하시오. (배열 내장 메서드 `map()` 사용 금지)
            */
           
           function myMap (a = [] , b = () => {}) {
                let newArray = [];
                a.forEach(element => {
                    newArray.push(b(element));
                });
               
                return newArray;
           }

           // 여기에 코드를 작성하세요
            

            console.log(myMap([1, 2, 3, 4], (x) => x * 2));   // [2, 4, 6, 8]
            console.log(myMap([1, 2, 3, 4], (x) => x ** 2));  // [1, 4, 9, 16]
        </script>
    </body>
    </body>
</html>
