        */

        let adminId = "als";
        let adminPw = 3456;

        let inputId = "admin";
        let inputPw = "1234";
        
        if (adminId == inputId && adminPw ===inputPw) {
            console.log("로그인 성공");
            return;
        }
            console.log("로그인 실패");

            console.log("아이디 확인 필요");

        }

        if (adminPw !== inputPw) {
            console.log("비밀번호 확인 필요");

        }
