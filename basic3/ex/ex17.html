    <script>
        /*
### 문제 17 — 함수 표현식: 원의 넓이

반지름을 매개변수로 받아 원의 넓이를 반환하는 함수를

**함수 표현식**으로 작성하시오. (`π = Math.PI` 사용)


const circleArea =  여기에 코드를 작성하세요 

console.log(circleArea(5));
console.log(circleArea(10));

        */
        const circleArea = function (r) {
            return Math.PI * r * r;
        }
      
        console.log(circleArea(5));
        console.log(circleArea(10));
    </script>
