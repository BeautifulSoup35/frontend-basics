<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        /*
두 숫자를 매개변수로 받아 합계를 **반환**하는 함수 `add`를 작성하시오.

`add(3, 7)`, `add(10, 25)` 두 경우를 호출하여 결과를 출력하시오.
        */

        let add = function (a, b) {
            return a + b;
        }
        
        console.log(add(3, 7));
        console.log(add(10, 25));
        
    </script>
</body>
</body>
</html>
