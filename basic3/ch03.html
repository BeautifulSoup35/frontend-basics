<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
    </head>
    <body>
        <script>
            class Student {
                
                //생성자
                constructor () {
                    console.log("생성자 호출!!!!");
                }
            }

            const s1 = new Student();
            const s2 = new Student();
            console.log(typeof s1);
            console.log(s1 === s2);

            const s3 = {};
            const s4 = {};
            console.log(typeof s3);
            console.log(s3 === s4);
            //typeof : object
            
            s1.name = "권민주"; 
            //문자열과 문자는 어떻게 구분하는가 
            //동적바인딩
            //문자열
            console.log(s1.name);
            s3.name = "권하나";
            console.log(s3.name);

            s2["name"] = "권둘";
            console.log(s2.name);
            console.log(s2["name"]);

            const key = "name";
            console.log(s1[key]);
            const datas = {
                names: ["권민주", "권나나", "권쥬"],
                ages: [33, 43, 44],
                a: () => {
                    console.log(datas.ages);
                    console.log(datas.names);

                }
            };

            // const key2 = "names";
            console.log(datas["names"][0]);
            datas.a();
            const datas2 = datas; //얕은 복사
            console.log(datas === datas2);//true
            const datas3 = {...datas};//깊은 복사
            console.log(datas === datas3); //flase

        </script>
    </body>
</html>
