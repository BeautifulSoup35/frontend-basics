<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <table class="table">
        <thead>
            <tr>
                <th><input type="checkbox" id="all" onchange="handleCheckOnChange(event)"></th>
                <th>번호</th>
                <th>이름</th>
            </tr>
        </thead>
        <tbody>
            <tr>
            </tr>
        </tbody>
    </table>

    <script>
        let tableRowData= [];

        function requstStudentData() {
            let studetntList = [
            {id: 1, name: "권민주"},
            {id: 2, name: "권주"},
            {id: 3, name: "민주"},
            {id: 4, name: "권민"},
        ];//서브로 부터 이 정보가 넘어온다 가정
            tableRowData = studetntList.map(s => ({
                ...s,//스프레드
                checked: false,


            }));//람다에서 중관호 치면 함수 몸체가 된다 return 
        }
        
        function render() {
            const tBody = document.querySelector("tbody");
            tBody.innerHTML = tableRowData.map(student => `
                <tr>
                    <td><input type="checkbox" id="${student.id}" ${student.checked? "checked": ""} onchange="handleCheckOnChange(event)"></td>            
                    <td>${student.id}</td>
                    <td> ${student.name}</td>
                </tr>`).join("");
            
            
        }
        requstStudentData();
        render();
        function handleCheckOnChange(e) {
            if (e.target.id === "all") {
                // console.log(e.target.checked);
                tableRowData = tableRowData.map(s => ({
                    ...s,
                    checked: e.target.checked,
                }));
                render();
                return;
            }
            tableRowData = tableRowData.map(s => {
                if (s.id === parseInt(e.target.id)) {
                    return {
                        ...s,
                        checked: e.target.checked,
                    }
                }
                return s;
            });
            const checkedRow = tableRowData.filter(s => s.checked);
            
            const allCheckBox = document.querySelector("#all");
            allCheckBox.checked = checkedRow.length === tableRowData.length;
            render();
        }
        

    </script>
</body>
</html>
