<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table {
            border: 1px solid #ddd;
        }
        th {
            background-color: #333;
            color: white;
            padding: 12px;
        }
        td {
            padding: 10px;
            text-align: right;
        }
    </style>
</head>
<body>

        <tr>
            <th>상품명</th>
            <th>가격</th>
            <th>수량</th>

        </tr>
        <tr>
            <td>노트북</td>
            <td>1,200,000</td>
            <td>1</td>
            <td>1,200,000</td>
        </tr>
        <tr>
            <td>마우스</td>
            <td>35,000</td>
            <td>2</td>
            <td>70,000</td>
        </tr>
        <tr>
            <td>키보드</td>
            <td>55,000</td>
            <td>1</td>
            <td>55,000</td>
        </tr>
        <tr>
            <td colspan="4" style="background-color: #f5f5f5; font-weight: bold;"  >1,325,000</td>
            
        </tr>
    </table>
</body>
</html>
