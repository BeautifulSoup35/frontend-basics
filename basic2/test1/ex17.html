<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box-a {
    width: 200px;
    padding: 20px;
    border: 5px solid black;
    box-sizing: content-box;  /* 기본값 */
}

.box-b {
    width: 200px;
    padding: 20px;
    border: 5px solid black;
    box-sizing: border-box;
}
    </style>
</head>
<body>
    <p class="box-a"></p>
    <p class="box-b"></p>
</body>
</html>

<!-- 실제 보이는 너비
     a: 200 + 40
