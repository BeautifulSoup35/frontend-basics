<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .input-box {
            position: relative;
            /* 부모를 기준으로 postition이 잡힌다 */
            width: 300px;
        }
        .username-input {
            box-sizing: border-box;
            padding-right: 90px;

            width: 100%;
            height: 40px;
        }
        .duplicated-btn {
            position: absolute;
            /* 본인기준에서 상단으로이동 */
            top: 50%;
            right: 1%;
            transform: translateY(-50%);
        }

        .input-box2 {
            display: flex;
            justify-content: space-between;
            /* 양끝으로 붙이기 */

            gap: 10px;
            align-items: center;
            box-sizing: border-box;
            border: 1px solid #dbdbdd;
            border-radius: 4px;
            padding: 10px;
            width: 300px;
            height: 40px;
        }
        .username-input2 {
            
            flex: 1;
           outline: none;
           border: none;
        }
        .duplicated-btn2 {
            transition: transform 1s ease-in-out ;
        }
        .duplicated-btn2:hover {
            transform: scale(103%) translateX(50%);
        }
        .box {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100px;
            height: 100px;
            background-color: beige;
            font-size: 40px;
            transform: rotate(45deg);
        }
        

    </style>
</head>
<body>
    <div class="input-box">
        <!-- input은 자식을 가질수없어서 안에 넣는게 어렵 -->
        <input type="text" class="username-input">
        <button class="duplicated-btn">중복확인</button>
    </div>

    <div class="input-box2">
        <input type="text" class="username-input2">
        <button class="duplicated-btn2">중복확인</button>
    </div>

    <div class="box">B</div>
    
</body>
</html>
