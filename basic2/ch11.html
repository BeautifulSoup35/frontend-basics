<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .chk-group {
            display: flex;
            align-items: center;
        }
        .chk-group >input[type ="checkbox"]  + label {
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            border: 1px solid #dbdbdb;
            border-radius: 8px;
            width: 25px;
            height: 25px;
        }

        /* 원 안쪽의 원 */
         .chk-group > input[type ="checkbox"]:checked  + label::after{
            content: "😊";
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 5px;
            display: block;
            box-sizing: border-box;

            border-radius: 50%;
            width: 20px;
            height: 20px;
            /* background-color: #bbb; */
        
         }
        /* 클래스에 들어있는 input의 checked 인것 하위선택자에 타입선택자 */
        .chk-group > input[type ="checkbox"] {
            display: none;
        }
    </style>
</head>
<body>
    <div class="chk-group">
        <input id="chk1" type="checkbox">
        <label for="chk1"></label>
        <label for="chk1">개발자</label>
    </div>
    <div class="chk-group">
        <input id="chk2" type="checkbox">
        <label for="chk2"></label>
        <label for="chk2">개발자2</label>
    </div>
    <!-- 컨펀트? 함수와같은건가 -->
    <div class="chk-group">
        <input id="chk3" type="checkbox">
        <label for="chk3"></label>
        <label for="chk3">개발자3</label>
    </div>
</body>
</html>
